<div class="page-container">
  <h2>Add New Investor</h2>

  <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="card">
    <form [formGroup]="investorForm" (ngSubmit)="createInvestor()">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" formControlName="firstName" placeholder="First Name" />
          <span class="error" *ngIf="investorForm.get('firstName')?.invalid && investorForm.get('firstName')?.touched">
            First name is required.
          </span>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" formControlName="lastName" placeholder="Last Name" />
          <span class="error" *ngIf="investorForm.get('lastName')?.invalid && investorForm.get('lastName')?.touched">
            Last name is required.
          </span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="Email" />
          <span class="error" *ngIf="investorForm.get('email')?.invalid && investorForm.get('email')?.touched">
            Valid email is required.
          </span>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" formControlName="dateOfBirth" />
          <span class="error" *ngIf="investorForm.get('dateOfBirth')?.invalid && investorForm.get('dateOfBirth')?.touched">
            Date of birth is required.
          </span>
        </div>
      </div>
      <button type="submit" [disabled]="investorForm.invalid">Add Investor</button>
    </form>
  </div>
</div>
